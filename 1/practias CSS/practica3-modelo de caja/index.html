<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width initial-scale=1.0">
    <title>Practica 3: Modelo de Caja</title>
    <link rel="stylesheet" href="CSS/estilos3-2.css">
</head>
<body>

    <div class="uno">
        <h2>Caja#1</h2>
        <p>Every day, I imagine a future where I can be with you</p>
    </div>

    <div class="dos">
        <h2>Caja#2</h2>
        <p>In my hand is a pen that will write a poem of me and you.</p>

    </div>

    <div class="tres">
        <h2>Caja#3</h2>

        <p>The ink flows down into a dark puddle</p>
    </div>

    <div class="cuatro">
        <h2>Caja#4</h2>
        <p>Just move your hand, write the way into his heart</p>
    </div>
</body>
</html>
